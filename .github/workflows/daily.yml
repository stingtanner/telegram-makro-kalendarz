name: Daily economic calendar (HIGH) -> Telegram

on:
  schedule:
    # GitHub cron działa w UTC.
    # Ustawiamy dwie godziny, żeby zawsze złapać okolice północy w Warszawie (DST).
    - cron: "10 22 * * *"
    - cron: "10 23 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python -m src.main
